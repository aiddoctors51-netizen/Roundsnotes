<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>RoundNotes</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#0A4F6E;--teal-2:#0f5f73;--teal-light:#e0f2fe;--teal-xlight:#f0f9ff;
  --green:#16a34a;--green-bg:#dcfce7;--amber:#d97706;--amber-bg:#fef3c7;
  --red:#dc2626;--red-bg:#fee2e2;
  --slate:#64748b;--border:#e2e8f0;--bg:#f1f5f9;--white:#fff;
  --radius:14px;--shadow:0 2px 8px rgba(0,0,0,.08);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:#0f172a;overflow:hidden}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:var(--teal);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .5s ease, visibility .5s ease;
}
#splash.hide{opacity:0;visibility:hidden}
.splash-logo{
  width:90px;height:90px;border-radius:22px;
  background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:44px;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
  animation:splashPop .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes splashPop{
  from{transform:scale(.4);opacity:0}
  to{transform:scale(1);opacity:1}
}
.splash-name{
  color:#fff;font-size:26px;font-weight:900;letter-spacing:-.5px;
  animation:splashFade .5s .25s ease both;
}
.splash-tagline{
  color:rgba(255,255,255,.7);font-size:13px;font-weight:500;
  animation:splashFade .5s .35s ease both;
}
@keyframes splashFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.splash-dots{
  display:flex;gap:7px;margin-top:8px;
  animation:splashFade .5s .5s ease both;
}
.splash-dots span{
  width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);
  animation:dotPulse 1.2s .7s ease-in-out infinite;
}
.splash-dots span:nth-child(2){animation-delay:.85s}
.splash-dots span:nth-child(3){animation-delay:1s}
@keyframes dotPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* ── TOPBAR ── */
.topbar{
  background:var(--teal);
  padding:calc(12px + var(--safe-top)) 16px 14px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.topbar h1{color:#fff;font-size:18px;font-weight:800;flex:1;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.topbar-logo{width:28px;height:28px;border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.topbar-sub{color:rgba(255,255,255,.75);font-size:12px;font-weight:500}
.icon-btn{
  background:rgba(255,255,255,.18);border:none;color:#fff;
  width:38px;height:38px;border-radius:50%;font-size:19px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.icon-btn:active{background:rgba(255,255,255,.3)}

/* ── HOME BODY ── */
#homeBody{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 16px calc(24px + var(--safe-bottom));
  -webkit-overflow-scrolling:touch;
}
.add-btn{
  width:100%;background:var(--teal);color:#fff;border:none;
  border-radius:var(--radius);padding:17px;font-size:16px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 14px rgba(10,79,110,.35);margin-bottom:22px;
  -webkit-appearance:none;
}
.add-btn:active{background:var(--teal-2);transform:scale(.98)}
.section-label{font-size:11px;font-weight:800;color:var(--slate);letter-spacing:.09em;text-transform:uppercase;margin-bottom:10px;padding-left:2px}
.section-hint{font-size:10px;color:#94a3b8;font-weight:500;float:right;text-transform:none;letter-spacing:0}

/* ── PATIENT CARD + DRAG ── */
.patient-card{
  background:var(--white);border-radius:var(--radius);padding:14px 14px;
  margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;
  gap:12px;cursor:pointer;border:2px solid transparent;transition:border-color .12s, opacity .15s, transform .15s;
  -webkit-appearance:none;position:relative;
}
.patient-card:active{border-color:var(--teal);background:#fafafa}
.patient-card.drag-over{border-color:var(--teal);background:var(--teal-xlight)}
.patient-card.dragging{opacity:.4;transform:scale(.97)}
.drag-handle{
  color:#cbd5e1;font-size:17px;cursor:grab;padding:4px 2px 4px 0;
  flex-shrink:0;touch-action:none;user-select:none;
  display:flex;flex-direction:column;gap:3px;align-items:center;
}
.drag-handle:active{cursor:grabbing}
.drag-handle svg{pointer-events:none}
.p-avatar{width:46px;height:46px;border-radius:50%;background:var(--teal-xlight);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:var(--teal);flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-sub{font-size:12px;color:var(--slate);margin-top:3px}
.p-time{font-size:10px;color:#94a3b8;margin-top:2px}
.pill{border-radius:20px;padding:4px 10px;font-size:10px;font-weight:800;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.pill-stable{background:var(--green-bg);color:var(--green)}
.pill-under_review{background:var(--amber-bg);color:var(--amber)}
.pill-critical{background:var(--red-bg);color:var(--red)}
.p-del{background:none;border:none;color:#cbd5e1;font-size:17px;padding:6px 3px;cursor:pointer;flex-shrink:0}
.p-del:active{color:var(--red)}
.empty-state{text-align:center;padding:52px 24px;color:var(--slate)}
.empty-icon{font-size:52px;margin-bottom:14px}
.empty-state p{font-size:14px;line-height:1.6}

/* ── SETTINGS MODAL ── */
#settingsModal{position:fixed;inset:0;z-index:800;display:none}
#settingsModal.open{display:flex;flex-direction:column;justify-content:flex-end}
#settingsModal .ovl{position:absolute;inset:0;background:rgba(0,0,0,.45)}
#settingsModal .sheet{
  position:relative;background:#fff;border-radius:22px 22px 0 0;
  padding:20px 18px calc(28px + var(--safe-bottom));z-index:1;max-height:85vh;overflow-y:auto;
}
#settingsModal h3{font-size:17px;font-weight:800;margin-bottom:4px;text-align:center}
#settingsModal .sh-sub{font-size:12px;color:var(--slate);text-align:center;margin-bottom:20px}
.setting-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.setting-field label{font-size:12px;font-weight:700;color:#374151;letter-spacing:.04em;text-transform:uppercase}
.setting-field input{
  padding:12px 13px;border-radius:10px;border:1.5px solid var(--border);
  font-size:15px;outline:none;font-family:inherit;width:100%;background:#fff;
  color:#0f172a;transition:border-color .15s;
}
.setting-field input:focus{border-color:var(--teal)}
.btn-save-settings{
  width:100%;background:var(--teal);color:#fff;border:none;border-radius:11px;
  padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;
}
.btn-save-settings:active{background:var(--teal-2)}
.settings-hint{font-size:11px;color:#94a3b8;text-align:center;margin-top:12px;line-height:1.5}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:calc(28px + var(--safe-bottom));left:50%;
  transform:translateX(-50%);padding:12px 22px;border-radius:10px;
  font-weight:700;font-size:14px;z-index:999;display:none;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.18);pointer-events:none;
}
#toast.show-success{display:block;background:var(--green);color:#fff}
#toast.show-error{display:block;background:var(--red);color:#fff}
#toast.show-info{display:block;background:var(--teal);color:#fff}

.screen{display:none;flex-direction:column;height:100dvh;height:100vh;overflow:hidden}
.screen.active{display:flex}
</style>
</head>
<body>

<!-- ══ SPLASH SCREEN ══ -->
<div id="splash">
  <div class="splash-logo">🏥</div>
  <div class="splash-name">RoundNotes</div>
  <div class="splash-tagline">Doctor's Round Assistant</div>
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<!-- ══════════ HOME SCREEN ══════════ -->
<div id="homeScreen" class="screen active">
  <div class="topbar">
    <h1>
      <div class="topbar-logo">🏥</div>
      RoundNotes
    </h1>
    <div><span id="topDrName" class="topbar-sub"></span></div>
    <button class="icon-btn" onclick="openSettings()" title="Settings">⚙️</button>
  </div>
  <div id="homeBody">
    <button class="add-btn" onclick="goToForm()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.8" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add New Patient
    </button>
    <div class="section-label">Your Patients <span class="section-hint">Hold &amp; drag to reorder</span></div>
    <div id="patientList"></div>
  </div>
</div>

<!-- ══════════ SETTINGS MODAL ══════════ -->
<div id="settingsModal">
  <div class="ovl" onclick="closeSettings()"></div>
  <div class="sheet">
    <h3>👨‍⚕️ Doctor Profile</h3>
    <p class="sh-sub">This appears as your signature on PDF reports</p>
    <div class="setting-field">
      <label>Full Name</label>
      <input id="s-drname" placeholder="Dr. Jane Smith"/>
    </div>
    <div class="setting-field">
      <label>Designation / Speciality</label>
      <input id="s-desig" placeholder="MBBS, MD — Cardiology"/>
    </div>
    <div class="setting-field">
      <label>Department</label>
      <input id="s-dept" placeholder="Department of Cardiology"/>
    </div>
    <div class="setting-field">
      <label>Hospital / Institution</label>
      <input id="s-hospital" placeholder="City General Hospital"/>
    </div>
    <button class="btn-save-settings" onclick="saveSettings()">Save Profile</button>
    <p class="settings-hint">Your profile is stored only on this device and never sent anywhere.</p>
  </div>
</div>

<div id="toast"></div>

<script>
// ══ STORAGE KEY ══
const KEY = 'rn_patients_v2';
const DR_KEY = 'rn_doctor';
const ORDER_KEY = 'rn_order_v2';

let patients = [];
let doctor = {};
let patientOrder = []; // Array of IDs in display order

function loadAll(){
  try{ patients = JSON.parse(localStorage.getItem(KEY)||'[]'); } catch(e){ patients=[]; }
  try{ doctor = JSON.parse(localStorage.getItem(DR_KEY)||'{}'); } catch(e){ doctor={}; }
  try{ patientOrder = JSON.parse(localStorage.getItem(ORDER_KEY)||'[]'); } catch(e){ patientOrder=[]; }
}
function savePatients(){ localStorage.setItem(KEY, JSON.stringify(patients)); }
function saveDoctor(){ localStorage.setItem(DR_KEY, JSON.stringify(doctor)); }
function saveOrder(){ localStorage.setItem(ORDER_KEY, JSON.stringify(patientOrder)); }

// ── Get sorted patients respecting custom order ──
function getSortedPatients(){
  // Add any new patients not in order to front
  const knownIds = new Set(patientOrder);
  const newIds = patients.filter(p=>!knownIds.has(p.id)).map(p=>p.id);
  if(newIds.length){
    patientOrder = [...newIds, ...patientOrder];
    saveOrder();
  }
  // Remove deleted patients from order
  const existingIds = new Set(patients.map(p=>p.id));
  patientOrder = patientOrder.filter(id=>existingIds.has(id));

  const map = {};
  patients.forEach(p=>map[p.id]=p);
  return patientOrder.map(id=>map[id]).filter(Boolean);
}

// ══ SETTINGS ══
function openSettings(){
  loadAll();
  document.getElementById('s-drname').value = doctor.name||'';
  document.getElementById('s-desig').value = doctor.desig||'';
  document.getElementById('s-dept').value = doctor.dept||'';
  document.getElementById('s-hospital').value = doctor.hospital||'';
  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings(){ document.getElementById('settingsModal').classList.remove('open'); }
function saveSettings(){
  doctor = {
    name: document.getElementById('s-drname').value.trim(),
    desig: document.getElementById('s-desig').value.trim(),
    dept: document.getElementById('s-dept').value.trim(),
    hospital: document.getElementById('s-hospital').value.trim()
  };
  saveDoctor();
  closeSettings();
  renderTopBar();
  showToast('Profile saved ✓','success');
}
function renderTopBar(){
  const el = document.getElementById('topDrName');
  el.textContent = doctor.name ? doctor.name : '';
}

// ══ NAVIGATION ══
function goToForm(id){
  if(id) sessionStorage.setItem('rn_edit_id', id);
  else sessionStorage.removeItem('rn_edit_id');
  window.location.href = 'patient.html';
}

// ══ HOME RENDER ══
function renderHome(){
  const list = document.getElementById('patientList');
  const sorted = getSortedPatients();
  if(!sorted.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🏥</div><p>No patients yet.<br>Tap <strong>Add New Patient</strong> to begin.</p></div>`;
    return;
  }
  list.innerHTML = sorted.map(p=>`
    <div class="patient-card" id="card-${p.id}" data-id="${p.id}">
      <div class="drag-handle" title="Hold to reorder">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
        </svg>
      </div>
      <div class="p-avatar" onclick="goToForm(${p.id})">${(p.name||'?')[0].toUpperCase()}</div>
      <div class="p-info" onclick="goToForm(${p.id})">
        <div class="p-name">${esc(p.name||'Unnamed')}</div>
        <div class="p-sub">${p.ward?'Ward: '+esc(p.ward):''}${p.ward&&p.bed?' · ':''}${p.bed?'Bed '+esc(p.bed):''}</div>
        <div class="p-time">${p.savedAt ? 'Updated '+timeAgo(p.savedAt) : ''}</div>
      </div>
      <span class="pill pill-${p.status||'stable'}" onclick="goToForm(${p.id})">${(p.status||'stable').replace('_',' ')}</span>
      <button class="p-del" onclick="event.stopPropagation();deletePatient(${p.id})" title="Delete">🗑</button>
    </div>
  `).join('');

  initDragAndDrop();
}

function deletePatient(id){
  if(!confirm('Delete this patient record?')) return;
  patients = patients.filter(p=>p.id!==id);
  patientOrder = patientOrder.filter(oid=>oid!==id);
  savePatients();
  saveOrder();
  renderHome();
}

// ══ DRAG AND DROP (touch + mouse) ══
function initDragAndDrop(){
  const list = document.getElementById('patientList');
  let dragEl = null, dragId = null;
  let startY = 0, startX = 0;
  let placeholder = null;
  let isDragging = false;
  let longPressTimer = null;

  function getCards(){ return Array.from(list.querySelectorAll('.patient-card')); }

  function startDrag(el, clientY, clientX){
    dragEl = el;
    dragId = parseInt(el.dataset.id);
    isDragging = true;

    // Create placeholder
    placeholder = document.createElement('div');
    placeholder.style.cssText = `height:${el.offsetHeight}px;margin-bottom:10px;border-radius:14px;background:var(--teal-xlight);border:2px dashed #0A4F6E;transition:none;`;
    el.parentNode.insertBefore(placeholder, el);

    el.classList.add('dragging');
    el.style.cssText = `
      position:fixed;width:${el.offsetWidth}px;z-index:500;
      left:${el.getBoundingClientRect().left}px;
      top:${el.getBoundingClientRect().top}px;
      box-shadow:0 8px 30px rgba(0,0,0,.18);
      pointer-events:none;transition:none;
    `;
    startY = clientY - el.getBoundingClientRect().top;
    startX = clientX - el.getBoundingClientRect().left;
    // Haptic if available
    if(navigator.vibrate) navigator.vibrate(30);
  }

  function onMove(clientY, clientX){
    if(!isDragging || !dragEl) return;
    const newTop = clientY - startY;
    dragEl.style.top = newTop + 'px';

    // Find which card to insert before
    const cards = getCards().filter(c=>c!==dragEl);
    let insertBefore = null;
    for(const card of cards){
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height/2;
      if(clientY < mid){ insertBefore = card; break; }
    }
    if(insertBefore){
      list.insertBefore(placeholder, insertBefore);
    } else {
      list.appendChild(placeholder);
    }
  }

  function endDrag(){
    if(!isDragging || !dragEl) return;
    isDragging = false;

    // Insert el where placeholder is
    list.insertBefore(dragEl, placeholder);
    placeholder.remove();
    dragEl.removeAttribute('style');
    dragEl.classList.remove('dragging');

    // Save new order
    patientOrder = getCards().map(c=>parseInt(c.dataset.id));
    saveOrder();
    dragEl = null;
    placeholder = null;
  }

  // ── Touch events on drag handles ──
  list.querySelectorAll('.drag-handle').forEach(handle=>{
    handle.addEventListener('touchstart', e=>{
      const card = handle.closest('.patient-card');
      longPressTimer = setTimeout(()=>{
        startDrag(card, e.touches[0].clientY, e.touches[0].clientX);
      }, 200);
    }, {passive:true});

    handle.addEventListener('touchmove', e=>{
      clearTimeout(longPressTimer);
      if(!isDragging) return;
      e.preventDefault();
      onMove(e.touches[0].clientY, e.touches[0].clientX);
    }, {passive:false});

    handle.addEventListener('touchend', e=>{
      clearTimeout(longPressTimer);
      endDrag();
    });
  });

  // ── Mouse events on drag handles (desktop) ──
  list.querySelectorAll('.drag-handle').forEach(handle=>{
    handle.addEventListener('mousedown', e=>{
      e.preventDefault();
      const card = handle.closest('.patient-card');
      startDrag(card, e.clientY, e.clientX);
      const onMouseMove = ev=>onMove(ev.clientY, ev.clientX);
      const onMouseUp = ()=>{ endDrag(); document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); };
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
  });
}

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

// ══ TOAST ══
let _tt;
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='show-'+type;
  clearTimeout(_tt); _tt=setTimeout(()=>t.className='',2800);
}

// ══ SPLASH ══
function hideSplash(){
  document.getElementById('splash').classList.add('hide');
}

// ══ INIT ══
loadAll();
renderTopBar();
renderHome();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// Hide splash after 1.6s
setTimeout(hideSplash, 1600);
</script>
</body>
</html>
